<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0076B6" />
  <title>Just Did It</title>
  <style>
    :root{--blue:#0076B6;--blue2:#005f92;--bg:#eef8ff;--card:#fff;--ink:#13202b;--muted:#637789;--line:#d7e7f0;--soft:#f6fbff;--orange:#f47d20;--danger:#b00020;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,var(--bg),#fff);color:var(--ink)}.app{max-width:720px;margin:0 auto;padding:16px 14px 70px}
    .top{display:flex;align-items:center;gap:14px;margin:6px 0 16px}.brandmark{width:88px;text-align:center;flex:0 0 auto}.ball{width:76px;height:76px;margin:0 auto;border-radius:50%;background:radial-gradient(circle at 35% 25%,#ffb45d,var(--orange) 55%,#b74712);border:4px solid #fff;box-shadow:0 8px 20px #005f9230;position:relative;overflow:hidden}.ball:before{content:"";position:absolute;inset:12px;border:2px solid #65310d55;border-radius:45% 50% 55% 45%;transform:rotate(-25deg)}.ball:after{content:"× ×";position:absolute;right:12px;bottom:17px;color:white;font-weight:900;font-size:13px;letter-spacing:-2px}.logoText{font-weight:900;font-style:italic;color:var(--blue2);font-size:15px;margin-top:2px;line-height:1}
    h1{margin:0;font-size:2rem;line-height:1}h2{margin:.2rem 0 .8rem}h3{margin:1rem 0 .25rem}.sub{color:var(--muted);margin:.25rem 0 0}.card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:16px;margin:12px 0;box-shadow:0 8px 22px #005f9218}.quiet{box-shadow:none;background:var(--soft)}
    .tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:sticky;top:0;z-index:2;background:#eef8fff0;padding:8px 0}.tab{border:1px solid var(--line);border-radius:16px;background:#fff;color:var(--blue2);font-weight:900;padding:11px}.tab.active{background:var(--blue);color:white;border-color:var(--blue)}.screen{display:none}.screen.active{display:block}
    label{display:block;font-size:.85rem;font-weight:900;color:var(--muted);margin:12px 0 5px}input,select{width:100%;font:inherit;border:1px solid var(--line);border-radius:15px;padding:12px;background:#fff;color:var(--ink)}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button,.btn{border:0;border-radius:16px;background:var(--blue);color:white;font:inherit;font-weight:900;padding:12px 14px}button.secondary,.btn.secondary{background:#e7f3fa;color:var(--blue2);border:1px solid var(--line)}button.danger{background:var(--danger)}
    .set{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;border:1px solid var(--line);border-radius:16px;background:var(--soft);padding:10px;margin:9px 0}.set button{padding:11px 12px}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:#eaf7ff;border:1px solid #c5e4f5;border-radius:17px;padding:12px}.metric b{display:block;font-size:1.35rem;color:var(--blue2)}.metric span{font-size:.78rem;font-weight:900;color:var(--muted);text-transform:uppercase}.item{border:1px solid var(--line);border-radius:16px;background:var(--soft);padding:12px;margin:8px 0}.itemTitle{font-weight:900}.muted{color:var(--muted)}.tiny{font-size:.85rem;color:var(--muted)}.hidden{display:none}.empty{padding:14px;color:var(--muted);text-align:center;border:1px dashed var(--line);border-radius:16px;background:#fff}
    @media(max-width:520px){.top{align-items:flex-start}.row{grid-template-columns:1fr}.summary{grid-template-columns:1fr 1fr}.set{grid-template-columns:1fr 1fr}.set button{grid-column:1/3}.brandmark{width:76px}.ball{width:66px;height:66px}.logoText{font-size:13px}}
  </style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brandmark"><div class="ball"></div><div class="logoText">Just Did It</div></div>
    <div><h1>Just Did It</h1><p class="sub">Track one exercise, save it, move to the next.</p></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="log">Log</button>
    <button class="tab" data-tab="today">Today</button>
    <button class="tab" data-tab="history">History</button>
  </nav>

  <section id="log" class="screen active">
    <div class="card">
      <h2>Current exercise</h2>
      <label>Exercise</label>
      <input id="exercise" list="exerciseList" placeholder="Bench press, curls, squats..." autocomplete="off" />
      <datalist id="exerciseList"></datalist>
      <div class="row">
        <div><label>Date</label><input id="date" type="date" /></div>
        <div><label>Unit</label><select id="unit"><option value="kg">kg</option><option value="lb">lb</option></select></div>
      </div>
      <h3>Sets for this exercise</h3>
      <div id="sets"></div>
      <div class="btns"><button class="secondary" id="addSet">Add set</button><button id="saveExercise">Save exercise</button></div>
      <div class="card quiet"><div class="summary"><div class="metric"><span>Sets</span><b id="sumSets">0</b></div><div class="metric"><span>Reps</span><b id="sumReps">0</b></div><div class="metric"><span>Volume</span><b id="sumVolume">0 kg</b></div></div></div>
    </div>
  </section>

  <section id="today" class="screen">
    <div class="card"><h2>Today</h2><div class="summary"><div class="metric"><span>Exercises</span><b id="todayExercises">0</b></div><div class="metric"><span>Sets</span><b id="todaySets">0</b></div><div class="metric"><span>Volume</span><b id="todayVolume">0 kg</b></div></div><div id="todayList"></div></div>
  </section>

  <section id="history" class="screen">
    <div class="card"><h2>History</h2><div id="historyList"></div></div>
    <div class="card quiet"><h2>Backup</h2><p class="muted">Export before replacing versions. Import restores saved exercise logs.</p><div class="btns"><button id="exportData">Export</button><label class="btn secondary" for="importData">Import</label><input id="importData" class="hidden" type="file" accept="application/json,.json" /></div><p id="status" class="tiny"></p></div>
  </section>
</div>

<script>
const KEY="just_did_it_v8_exercise_flow";
const LEGACY=["just_did_it_v7_strength","just_did_it_v6_4","just_did_it_v6_3","just_did_it_v5"];
const starter=["Bench press","Squat","Deadlift","Overhead press","Dumbbell curl","Dumbbell row","Push-ups","Lunges","Plank","Goblet squat"];
let state=load();
const draft={sets:[{reps:10,weight:0}]};
function id(){return "e_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function today(){return new Date().toISOString().slice(0,10)}
function n(v){return Number(v)||0}
function reps(sets){return sets.reduce((a,s)=>a+n(s.reps),0)}
function volume(sets){return sets.reduce((a,s)=>a+n(s.reps)*n(s.weight),0)}
function load(){let raw=localStorage.getItem(KEY);if(!raw){for(const k of LEGACY){raw=localStorage.getItem(k);if(raw)break}}try{const p=raw?JSON.parse(raw):{};return{logs:Array.isArray(p.logs)?p.logs:migrate(p.workouts||[]),exercises:Array.from(new Set([...(p.exercises||[]).map(e=>e.name||e),...starter])).sort(),unit:p.unit||"kg"}}catch{return{logs:[],exercises:starter,unit:"kg"}}}
function migrate(workouts){const logs=[];(workouts||[]).forEach(w=>(w.sets||[]).forEach(s=>logs.push({id:id(),date:w.date||today(),exercise:s.exerciseName||"Exercise",unit:"kg",sets:Array.from({length:n(s.sets)||1},()=>({reps:n(s.reps),weight:n(s.weight)}))})));return logs}
function save(){localStorage.setItem(KEY,JSON.stringify(state));render()}
function money(v,u){return Math.round(n(v)).toLocaleString()+" "+u}
function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"}[m]))}
function renderSets(){const box=document.getElementById("sets");box.innerHTML=draft.sets.map((s,i)=>`<div class="set"><div><label>Reps</label><input type="number" min="0" inputmode="numeric" value="${s.reps}" oninput="editSet(${i},'reps',this.value)"></div><div><label>Weight</label><input type="number" min="0" step="0.5" inputmode="decimal" value="${s.weight}" oninput="editSet(${i},'weight',this.value)"></div><button class="secondary" onclick="removeSet(${i})">Remove</button></div>`).join("");const u=document.getElementById("unit").value;document.getElementById("sumSets").textContent=draft.sets.length;document.getElementById("sumReps").textContent=reps(draft.sets).toLocaleString();document.getElementById("sumVolume").textContent=money(volume(draft.sets),u)}
function renderLists(){document.getElementById("exerciseList").innerHTML=state.exercises.map(e=>`<option value="${esc(e)}"></option>`).join("");const t=today();const todays=state.logs.filter(l=>l.date===t);document.getElementById("todayExercises").textContent=todays.length;document.getElementById("todaySets").textContent=todays.reduce((a,l)=>a+l.sets.length,0);document.getElementById("todayVolume").textContent=money(todays.reduce((a,l)=>a+volume(l.sets),0),state.unit);document.getElementById("todayList").innerHTML=todays.length?todays.map(renderLog).join(""):'<div class="empty">No exercises logged today.</div>';document.getElementById("historyList").innerHTML=state.logs.length?state.logs.slice(0,40).map(renderLog).join(""):'<div class="empty">No history yet.</div>'}
function renderLog(l){return `<div class="item"><div class="itemTitle">${esc(l.exercise)} <span class="muted">• ${esc(l.date)}</span></div><div>${l.sets.length} sets • ${reps(l.sets).toLocaleString()} reps • ${money(volume(l.sets),l.unit||state.unit)}</div><div class="tiny">${l.sets.map((s,i)=>`Set ${i+1}: ${n(s.reps)} reps @ ${n(s.weight)} ${l.unit||state.unit}`).join(" | ")}</div><div class="btns"><button class="secondary" onclick="repeatLog('${l.id}')">Repeat</button><button class="danger" onclick="deleteLog('${l.id}')">Delete</button></div></div>`}
function render(){renderSets();renderLists()}
function editSet(i,k,v){draft.sets[i][k]=n(v);renderSets()}
function removeSet(i){draft.sets.splice(i,1);if(!draft.sets.length)draft.sets.push({reps:10,weight:0});renderSets()}
function repeatLog(logId){const l=state.logs.find(x=>x.id===logId);if(!l)return;document.getElementById("exercise").value=l.exercise;document.getElementById("unit").value=l.unit||state.unit;draft.sets=l.sets.map(s=>({...s}));document.querySelector('[data-tab="log"]').click();render()}
function deleteLog(logId){state.logs=state.logs.filter(l=>l.id!==logId);save()}
function switchTab(id){document.querySelectorAll(".tab").forEach(b=>b.classList.toggle("active",b.dataset.tab===id));document.querySelectorAll(".screen").forEach(s=>s.classList.toggle("active",s.id===id));render()}
document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>switchTab(b.dataset.tab));
document.getElementById("date").value=today();document.getElementById("unit").value=state.unit;document.getElementById("unit").onchange=()=>{state.unit=document.getElementById("unit").value;save()};document.getElementById("addSet").onclick=()=>{draft.sets.push({...draft.sets[draft.sets.length-1]});renderSets()};
document.getElementById("saveExercise").onclick=()=>{const ex=document.getElementById("exercise").value.trim();if(!ex){alert("Enter the exercise first.");return}const unit=document.getElementById("unit").value;state.unit=unit;if(!state.exercises.includes(ex))state.exercises.push(ex);state.exercises.sort();state.logs.unshift({id:id(),date:document.getElementById("date").value||today(),exercise:ex,unit,sets:draft.sets.map(s=>({reps:n(s.reps),weight:n(s.weight)}))});draft.sets=[{reps:10,weight:0}];document.getElementById("exercise").value="";save();switchTab("today")};
document.getElementById("exportData").onclick=()=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify(state,null,2)],{type:"application/json"}));a.download="just-did-it-backup.json";a.click();URL.revokeObjectURL(a.href)};
document.getElementById("importData").onchange=async e=>{try{const p=JSON.parse(await e.target.files[0].text());state={logs:p.logs||[],exercises:p.exercises||starter,unit:p.unit||"kg"};save();document.getElementById("status").textContent="Import complete."}catch{document.getElementById("status").textContent="Import failed."}};
window.editSet=editSet;window.removeSet=removeSet;window.repeatLog=repeatLog;window.deleteLog=deleteLog;render();
</script>
</body>
</html>
